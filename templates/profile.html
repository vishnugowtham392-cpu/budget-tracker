<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .profile-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0px 0px 20px lightgray;
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .profile-header h1 {
            color: #28a745;
        }
        
        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #28a745;
            object-fit: cover;
            margin-bottom: 15px;
        }
        
        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 15px;
            transition: 0.3s;
        }
        
        .btn-back:hover {
            background: #218838;
            transform: scale(1.05);
        }
        
        /* Dark mode support */
        .dark .profile-container {
            background: #1e1e1e;
            color: #f1f1f1;
        }
        
        .dark .profile-header h1 {
            color: #66b3ff;
        }
        
        .dark .profile-photo {
            border-color: #66b3ff;
        }
        
        .dark input,
        .dark select {
            background: #2a2a2a;
            color: #f1f1f1;
            border: 1px solid #444;
        }
        
        @media (max-width: 480px) {
            .profile-container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <img src="{{ url_for('static', filename='uploads/' + user[4] if user[4] else 'default.png') }}" 
                 alt="Profile Photo" 
                 class="profile-photo">
            <h1>👤 Profile Settings</h1>
            <p>Update your account information</p>
        </div>
        
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="username" value="{{ user[1] if user else '' }}" required>
            <input type="email" name="email" value="{{ user[3] if user else '' }}" required>
            <input type="password" name="password" value="{{ user[2] if user else '' }}" required>
            <input type="file" name="photo" accept="image/*">
            
            <button type="submit">Save Changes</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="/" class="btn-back">⬅ Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
