services:
  - type: web
    name: budget-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: budget-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: budget-db
    plan: free